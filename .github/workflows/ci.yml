name: 每周更新

on:
  schedule:
    - cron: "0 0 * * 1"   # 每周一 00:00 UTC = 北京时间 08:00 自动运行
  workflow_dispatch:      # 也可在 Actions 页面手动点「Run workflow」立即运行

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 抓取报告
        run: python scripts/fetch.py

      - name: 生成每周综述
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/digest.py

      - name: 生成静态站点
        run: python scripts/build_site.py

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: weekly update" || echo "no changes"
          git push
